name: Self Approve PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  actions: read
  pull-requests: write

jobs:
  check-and-approve:
    runs-on: ubuntu-latest
    steps:
      - name: Check conditions and approve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_EMAIL: eamon9812@gmail.com
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 检查0: 验证 PR 当前 head SHA 未被 force-push
          current_sha=$(gh pr view $PR_NUMBER -R $REPO --json headRefOid --jq '.headRefOid')
          trigger_sha=$(gh api repos/$REPO/pulls/$PR_NUMBER --jq '.head.sha')
          echo "Trigger SHA: $trigger_sha"
          echo "Current SHA: $current_sha"

          if [ "$current_sha" != "$trigger_sha" ]; then
            echo "PR was force-pushed. Skip."
            exit 0
          fi

          # 检查1: 通过 GitHub API 获取作者邮箱
          author_login=$(gh pr view $PR_NUMBER -R $REPO --json author --jq '.author.login')
          author_email=$(gh api users/$author_login --jq '.email // "null"')
          echo "Author: $author_login, Email: $author_email"

          if [ "$author_email" != "$EXPECTED_EMAIL" ]; then
            echo "Not Eamon's PR (email mismatch), skip"
            exit 0
          fi

          # 检查2: 必须有 auto-merge 标签
          labels=$(gh pr view $PR_NUMBER -R $REPO --json labels --jq '.labels[].name')
          if ! echo "$labels" | grep -q "auto-merge"; then
            echo "No auto-merge label, skip"
            exit 0
          fi

          # 检查3: 获取 PR 的 branch name
          pr_branch=$(gh pr view $PR_NUMBER -R $REPO --json headRefName --jq '.headRefName')
          echo "PR branch: $pr_branch"

          # 检查4: CI 必须通过
          ci_status=$(gh run list -R $REPO --workflow=ci.yml --branch=$pr_branch --status=completed --json=conclusion --jq '.[0].conclusion // "null"')
          echo "CI status: $ci_status"
          if [ "$ci_status" != "success" ]; then
            echo "CI not passed, skip"
            exit 0
          fi

          # 检查5: AI review 必须通过
          review_status=$(gh run list -R $REPO --workflow=ai-review.yml --branch=$pr_branch --status=completed --json=conclusion --jq '.[0].conclusion // "null"')
          echo "AI review status: $review_status"
          if [ "$review_status" != "success" ]; then
            echo "AI review not passed, skip"
            exit 0
          fi

          # 全部通过，执行 approve
          echo "All conditions met, approving PR..."
          gh pr review $PR_NUMBER -R $REPO --approve -b "Auto-approved by self-approve workflow"
