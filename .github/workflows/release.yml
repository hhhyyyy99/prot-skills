name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  RELEASE_NOTES_DIR: docs/releases

jobs:
  release:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-22.04
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check app metadata
        run: pnpm app:check

      - name: Load release notes
        shell: bash
        run: |
          notes_file="${RELEASE_NOTES_DIR}/${GITHUB_REF_NAME}.md"
          if [[ ! -f "$notes_file" ]]; then
            echo "Missing release notes file: $notes_file" >&2
            exit 1
          fi

          {
            echo "RELEASE_NOTES<<EOF"
            cat "$notes_file"
            echo
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build and publish Tauri release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Prot Skills ${{ github.ref_name }}"
          releaseBody: ${{ env.RELEASE_NOTES }}
          releaseAssetNamePattern: "Prot-Skills-v[version]-[platform]-[arch][setup][ext]"
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
