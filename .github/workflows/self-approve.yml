name: Self Approve PR

on:
  workflow_run:
    types: [completed]
    workflows: [CI, AI Review]

jobs:
  check-and-approve:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Get PR info
        id: pr-info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # 通过 commit SHA 获取关联的 PR
          pr_data=$(gh api repos/$REPO/commits/$HEAD_SHA/pulls --jq '.[0]')
          pr_number=$(echo "$pr_data" | jq -r '.number // "null"')
          author_login=$(echo "$pr_data" | jq -r '.user.login // "null"')

          if [ "$pr_number" = "null" ] || [ "$author_login" = "null" ]; then
            echo "No PR found for this commit"
            exit 0
          fi

          echo "PR: $pr_number, Author: $author_login"

          # 保存到输出，供后续步骤使用
          echo "PR_NUMBER=$pr_number" >> $GITHUB_OUTPUT
          echo "AUTHOR_LOGIN=$author_login" >> $GITHUB_OUTPUT

      - name: Check conditions and approve
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EXPECTED_EMAIL: eamon9812@gmail.com
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr-info.outputs.PR_NUMBER }}
          AUTHOR_LOGIN: ${{ steps.pr-info.outputs.AUTHOR_LOGIN }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          # 检查1: 通过 GitHub API 获取作者邮箱
          author_email=$(gh api users/$AUTHOR_LOGIN --jq '.email // "null"')
          echo "Author: $AUTHOR_LOGIN, Email: $author_email"

          if [ "$author_email" != "$EXPECTED_EMAIL" ]; then
            echo "Not Eamon's PR (email mismatch), skip"
            exit 0
          fi

          # 检查2: 必须有 auto-merge 标签
          labels=$(gh pr view $PR_NUMBER -R $REPO --json labels --jq '.labels[].name')
          if ! echo "$labels" | grep -q "auto-merge"; then
            echo "No auto-merge label, skip"
            exit 0
          fi

          # 检查3: CI 必须通过 (按 commit SHA 过滤)
          ci_status=$(gh run list -R $REPO --workflow=ci.yml --branch=refs/pull/$PR_NUMBER/merge --status=completed --json=head_sha,conclusion --jq --arg sha "$HEAD_SHA" '[.[] | select(.head_sha == $sha)] | .[0].conclusion // "null"')
          if [ "$ci_status" != "success" ]; then
            echo "CI not passed ($ci_status), skip"
            exit 0
          fi

          # 检查4: AI review 必须通过 (按 commit SHA 过滤)
          review_status=$(gh run list -R $REPO --workflow=ai-review.yml --branch=refs/pull/$PR_NUMBER/merge --status=completed --json=head_sha,conclusion --jq --arg sha "$HEAD_SHA" '[.[] | select(.head_sha == $sha)] | .[0].conclusion // "null"')
          if [ "$review_status" != "success" ]; then
            echo "AI review not passed ($review_status), skip"
            exit 0
          fi

          # 全部通过，执行 approve
          echo "All conditions met, approving PR..."
          gh pr review $PR_NUMBER -R $REPO --approve -b "Auto-approved by self-approve workflow"
