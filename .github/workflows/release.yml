name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        type: string

concurrency:
  group: release
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

jobs:
  # ── Web 构建 ────────────────────────────────────────────────
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check app metadata
        run: pnpm app:check

      - name: Get app metadata
        id: meta
        run: |
          echo "name=$(jq -r '.productName // .name' package.json)" >> $GITHUB_OUTPUT
          echo "slug=$(jq -r '.name' package.json)" >> $GITHUB_OUTPUT
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Build Web
        run: pnpm build

      - name: Package Web artifacts
        run: |
          cd dist
          zip -r ../${{ steps.meta.outputs.slug }}-web.zip .

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-artifacts
          path: ${{ steps.meta.outputs.slug }}-web.zip
          retention-days: 30

  # ── Tauri 桌面应用构建 ───────────────────────────────────────
  build-tauri:
    name: Build Tauri
    runs-on: ubuntu-latest
    # 注：Tauri 目前仅支持 Linux 构建。如需多平台打包，需要配置 matrix 或使用 GitHub Hosted Runners 的跨平台能力
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Check app metadata
        run: pnpm app:check

      - name: Get app metadata
        id: meta
        run: |
          echo "name=$(jq -r '.productName // .name' package.json)" >> $GITHUB_OUTPUT
          echo "slug=$(jq -r '.name' package.json)" >> $GITHUB_OUTPUT
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri
        run: pnpm tauri:build

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-artifacts
          path: src-tauri/target/release/bundle
          pattern: '*'
          if-no-files-found: error
          retention-days: 30

  # ── 创建 Release ────────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-web, build-tauri]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get app metadata
        id: meta
        run: |
          echo "name=$(jq -r '.productName // .name' package.json)" >> $GITHUB_OUTPUT
          echo "slug=$(jq -r '.name' package.json)" >> $GITHUB_OUTPUT
          echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: '${{ steps.meta.outputs.name }} ${{ github.ref_name }}'
          draft: true
          generate_release_notes: true
          files: |
            artifacts/web-artifacts/**/*.zip
            artifacts/tauri-artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
