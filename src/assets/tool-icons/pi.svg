<?xml version="1.0" encoding="UTF-8"?>
<!--
  Pi coding agent logo. Source: https://pi.dev/logo-auto.svg
  Project: https://github.com/earendil-works/pi
  License/usage: brand mark used to identify the Pi tool inside Prot Skills.
  Static black fill so the existing `invertInDark` CSS path can flip it to white
  in dark theme, matching how other monochrome marks (e.g. openai) are handled.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Pi">
  <title>Pi</title>
  <!-- P shape: outer boundary clockwise, inner hole counter-clockwise -->
  <path fill="#000" fill-rule="evenodd" d="M165.29 165.29 H517.36 V400 H400 V517.36 H282.65 V634.72 H165.29 Z M282.65 282.65 V400 H400 V282.65 Z"/>
  <!-- i dot -->
  <path fill="#000" d="M517.36 400 H634.72 V634.72 H517.36 Z"/>
</svg>
